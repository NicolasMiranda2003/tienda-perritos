apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-db
  labels:
    app: tienda-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tienda-db
  template:
    metadata:
      labels:
        app: tienda-db
    spec:
      containers:
      - name: mongo
        image: mongo:5.0
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: tienda-db-service
spec:
  selector:
    app: tienda-db
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP