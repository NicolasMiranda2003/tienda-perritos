apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-backend
  labels:
    app: tienda-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-backend
  template:
    metadata:
      labels:
        app: tienda-backend
    spec:
      containers:
      - name: backend
        # Imagen desde tu ECR privado (IE2)
        image: 757858572974.dkr.ecr.us-east-1.amazonaws.com/tienda-backend:latest
        ports:
        - containerPort: 80
        env:
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: MONGO_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: tienda-backend-service
spec:
  selector:
    app: tienda-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP